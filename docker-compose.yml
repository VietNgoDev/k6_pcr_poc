version: '3.8'

services:
  mock-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080

  k6-runner:
    image: grafana/k6:latest
    depends_on:
      - mock-api
    volumes:
      - ./dist:/app/dist
      - ./src/load-test.ts:/app/src/load-test.ts
      - ./apis_config.json:/app/apis_config.json
    env_file:
      - .env.sample
    command: run --summary-export=/app/dist/report.json /app/src/load-test.ts
