name: Load Test CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  load-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Transpile Codebase
        run: npm run build

      - name: Run containerized k6 and parse reports
        run: |
          set -e
          echo "Starting docker compose and running k6..."
          docker compose up --build --abort-on-container-exit --exit-code-from k6-runner

      - name: Parse metrics and compile reports
        run: |
          node dist/export.js /app/dist/report.json

      - name: Archive Performance Summary Reports
        uses: actions/upload-artifact@v4
        with:
          name: performance-reports
          path: |
            /app/performance_summary.txt
            /app/report.html
            /app/dist/report.json
